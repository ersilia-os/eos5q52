Slug: antimicrobial-activity-spneumoniae
Status: In progress
Title: Antimicrobial activity prediction against Streptococcus pneumoniae from 
  public ChEMBL data
Description: Bioactivity prediction of growth inhibition in Streptococcus 
  pneumoniae, trained as binary (active/inactive) classifiers from publicly 
  available data in ChEMBL. Independent models are trained on multiple 
  bioactivity datasets, corresponding to dose-response (MIC) assays, among 
  others. A ranking score is provided for each model alongside a combined 
  consensus score.
